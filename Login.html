<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style4.css">
</head>
<body>
    <div class="box">
        <form>
            <h1>Login</h1>
           <div>
            <label for="first" style="display: block;">Email:</label>
            <input type="text" placeholder="Enter email" id="first" style="display: block;">
            </div>

            <div>
            <label for="second" style="display: block;">Password:</label>
            <input type="password" placeholder="Enter Password" id="second" style="display: block;">
            </div>
            <div>
           <div class="checkbox">

               
                  <input type="checkbox" id="show-pass">
                  <label for="show-pass"> Show Password</label>

            </div> 
            <button>SIGN IN</button>
        </form>

        <div class="forget">
            <p class="footer-text">Forget <a href="#">Username/Password</a>?</p>
            
            <p class="footer-text">Don't have an account? <a href="#">Sign up</a></p>
            
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
